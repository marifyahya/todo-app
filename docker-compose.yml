services:
  db:
    image: postgres:15-alpine
    container_name: todos-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: todos-backend
    ports:
      - "${BACKEND_PORT}:8080"
    volumes:
      - ./backend:/app
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=5432
    deploy:
      resources:
        limits:
          memory: 2G

  frontend:
    build: ./frontend
    container_name: todos-frontend
    ports:
      - "${FRONTEND_PORT}:5173"
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
